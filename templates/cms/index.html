<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{COMPANY_NAME}} - {{CITY}}'s trusted roofing, siding, and window contractor. Quality craftsmanship, free estimates, licensed and insured.">
  <meta name="keywords" content="roofing, siding, windows, insulation, contractor, {{CITY}}, {{STATE_FULL}}, home improvement">
  <meta name="author" content="{{COMPANY_NAME}}">
  
  <title>{{CITY}} {{INDUSTRY}} | {{COMPANY_NAME}}</title>
  
  <!-- Favicon (dynamically updated from site settings on load) -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" id="dynamic-favicon">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" id="dynamic-favicon-png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <script>
    // Fetch tenant favicon from site settings so the admin panel shows the correct icon
    (function() {
      var token = localStorage.getItem('adminToken');
      if (!token) return;
      fetch('/admin/site-settings', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(s) {
          var fav = s && (s.favicon || s.logo);
          if (fav) {
            var el = document.getElementById('dynamic-favicon');
            var el2 = document.getElementById('dynamic-favicon-png');
            if (el) el.href = fav;
            if (el2) el2.href = fav;
          }
        })
        .catch(function() {});
    })();
  </script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Open Graph -->
  <meta property="og:title" content="{{CITY}} {{INDUSTRY}} | {{COMPANY_NAME}}">
  <meta property="og:description" content="Transform your home with quality roofing, siding, and windows. Free estimates. Serving {{CITY}} and the {{SERVICE_REGION}}.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{SITE_URL}}">
  <meta property="og:image" content="/logo.jpg">
  
  <!-- Schema.org is injected dynamically per page for richer structured data -->
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>

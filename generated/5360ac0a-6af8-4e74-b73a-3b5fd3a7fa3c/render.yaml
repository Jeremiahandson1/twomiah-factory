# Jeremiah CRM — Render Blueprint
# Generated by BuildPro Factory

services:
  - type: web
    name: jeremiah-api
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: cd backend && node src/index.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jeremiah-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://jeremiah-crm.onrender.com
    disk:
      name: uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1

  - type: web
    name: jeremiah-crm
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: jeremiah-db
    plan: starter
    databaseName: jeremiah_crm

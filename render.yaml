services:
  # ─── Factory API ──────────────────────────────────────────────────────────────
  - type: web
    name: twomiah-factory-api
    runtime: node
    plan: starter
    buildCommand: curl -fsSL https://bun.sh/install | bash && export PATH="$HOME/.bun/bin:$PATH" && cd apps/api && bun install
    startCommand: export PATH="$HOME/.bun/bin:$PATH" && cd apps/api && bun run start
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_ORG
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: RENDER_OWNER_ID
        sync: false
      - key: PLATFORM_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_FACTORY_WEBHOOK_SECRET
        sync: false
      - key: CRON_SECRET
        generateValue: true
      - key: PORT
        value: "3001"

  # ─── Factory Platform (React SPA) ────────────────────────────────────────────
  - type: web
    name: twomiah-factory-platform
    runtime: node
    plan: starter
    buildCommand: curl -fsSL https://bun.sh/install | bash && export PATH="$HOME/.bun/bin:$PATH" && cd apps/platform && bun install && bun run build && npm install -g serve
    startCommand: cd apps/platform && npx serve dist -s -l $PORT
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_KEY
        sync: false
      - key: PORT
        value: "3000"

  # ─── Cleanup Cron Job ────────────────────────────────────────────────────────
  - type: cron
    name: twomiah-factory-cleanup
    runtime: node
    schedule: "0 * * * *"
    buildCommand: curl -fsSL https://bun.sh/install | bash && export PATH="$HOME/.bun/bin:$PATH" && cd apps/api && bun install
    startCommand: export PATH="$HOME/.bun/bin:$PATH" && cd apps/api && bun run src/cron/cleanup.ts
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: twomiah-factory-api
          property: hostport
      - key: CRON_SECRET
        fromService:
          type: web
          name: twomiah-factory-api
          envVarKey: CRON_SECRET
